<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ejemplo de página VSL optimizada para SEO con diseño llamativo y botón que redirige a video de YouTube." />
  <title>Ejemplo de Página VSL Optimizada para SEO</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 0 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    p {
      font-size: 1.25rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 8px rgba(0,0,0,0.2);
    }
    a.button {
      display: inline-block;
      background-color: #ff3b3f;
      color: white;
      font-weight: bold;
      padding: 1rem 2.5rem;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1.5rem;
      box-shadow: 0 0 15px #ff3b3f;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
    a.button:hover {
      background-color: #e63235;
      box-shadow: 0 0 25px #e63235;
    }
    footer {
      position: absolute;
      bottom: 15px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      text-shadow: none;
    }
  </style>
</head>
<body>
  <h1>Esta página es un ejemplo para JoSeo</h1>
  <p>Bienvenido a esta landing page optimizada para SEO con un diseño moderno y llamativo.</p>
  <a href="https://www.youtube.com/watch?v=_ewwO0Y1zb4" target="_blank" rel="noopener noreferrer" class="button">Ver Video Ahora</a>
  <footer>© 2024 Tu Empresa - Todos los derechos reservados.</footer>
</body>
</html>
